name: CI

on:
  push:
    branches: [main]
  pull_request:

# Every quality gate that verify-live.sh runs locally, now enforced on every
# push/PR so nothing reaches main unchecked. Database integration tests use a
# disposable Supabase stack on the GitHub-hosted runner; no hosted project,
# production credentials, or deployment permissions are involved.
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit + component tests
        run: bunx vitest run

      - name: Production build
        run: bun run build

      - name: Deno-check edge functions
        run: >-
          deno check --no-config --node-modules-dir=manual --no-remote
          supabase/functions/analyze-slab/index.ts
          supabase/functions/pricecharting-search/index.ts

      - name: Rebuild edge bundles (must match committed output)
        run: |
          node scripts/build-pricecharting-edge-bundle.mjs
          node scripts/build-analyze-slab-edge-bundle.mjs
          if ! git diff --quiet -- supabase/functions/_shared/*-bundle.js; then
            echo "::error::Edge bundle is stale — run the build:*-bundle scripts and commit the output."
            git --no-pager diff --stat -- supabase/functions/_shared/*-bundle.js
            exit 1
          fi

      - name: Secret scan (source + generated bundles)
        run: |
          SECRET_RE='sk-ant-[A-Za-z0-9_-]{8}|-----BEGIN [A-Z ]*PRIVATE KEY-----|xoxb-[0-9A-Za-z-]{10}|AKIA[0-9A-Z]{16}|eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{10,}'
          if grep -rnE "$SECRET_RE" src supabase scripts \
               --include='*.ts' --include='*.tsx' --include='*.js' --include='*.sql' --include='*.mjs' --include='*.sh' \
               2>/dev/null | grep -v node_modules; then
            echo "::error::possible secret committed"
            exit 1
          fi
          echo "secret scan clean"

  supabase-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: supabase/setup-cli@v3
        with:
          version: 2.84.2

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Start disposable Supabase stack
        run: supabase start

      - name: Reset database from migrations
        run: supabase db reset --local --no-seed

      # The whole directory, not one hard-coded file: a new integration suite must
      # RUN, not sit skipped while CI reports green. `db reset` above applied every
      # migration, so these exercise the real schema, RLS, and RPCs.
      - name: Run database integration tests
        run: |
          eval "$(supabase status -o env)"
          TEST_ANON_KEY="${ANON_KEY:-$PUBLISHABLE_KEY}"
          TEST_SERVICE_KEY="${SERVICE_ROLE_KEY:-$SECRET_KEY}"
          test -n "$API_URL"
          test -n "$TEST_ANON_KEY"
          test -n "$TEST_SERVICE_KEY"
          SLABVAULT_TEST_URL="$API_URL" \
          SLABVAULT_TEST_ANON_KEY="$TEST_ANON_KEY" \
          SLABVAULT_TEST_SERVICE_KEY="$TEST_SERVICE_KEY" \
            bunx vitest run src/test/integration \
              --reporter=verbose --reporter=json --outputFile=/tmp/integration.json

      # A skipped integration suite proves nothing. If the live-Supabase env ever
      # stops reaching vitest, every test would silently skip and CI would still
      # report green — so fail loudly on any skip.
      - name: Assert no integration test was skipped
        run: |
          SKIPPED=$(bun -e "const r = await Bun.file('/tmp/integration.json').json(); console.log(r.numPendingTests + r.numTodoTests)")
          TOTAL=$(bun -e "const r = await Bun.file('/tmp/integration.json').json(); console.log(r.numTotalTests)")
          echo "integration tests: total=$TOTAL skipped=$SKIPPED"
          if [ "$SKIPPED" != "0" ]; then
            echo "::error::$SKIPPED integration test(s) were SKIPPED — the live Supabase env did not reach vitest, so nothing was proved."
            exit 1
          fi
          if [ "$TOTAL" = "0" ]; then
            echo "::error::No integration tests ran at all."
            exit 1
          fi

      - name: Stop disposable Supabase stack
        if: always()
        run: supabase stop --no-backup
