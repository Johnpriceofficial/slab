name: Build Market Intelligence Bundle

on:
  push:
    branches:
      - agent/phase0-reliability
  pull_request:
    branches:
      - main

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:market-intel-bundle
      - uses: actions/upload-artifact@v4
        with:
          name: market-intelligence-bundle
          path: supabase/functions/_shared/market-intelligence-bundle.js
