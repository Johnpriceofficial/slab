name: Build Market Intelligence Bundle

on:
  push:
    branches:
      - agent/phase0-reliability

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase0-reliability
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:market-intel-bundle
      - name: Commit generated bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/functions/_shared/market-intelligence-bundle.js
          if git diff --cached --quiet; then
            echo "Bundle already current"
          else
            git commit -m "Rebuild Market Intelligence edge bundle"
            git push origin HEAD:agent/phase0-reliability
          fi
